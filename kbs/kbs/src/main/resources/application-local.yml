logging:
  level:
    org.suym.ai.kbs: DEBUG
    org.springframework.ai: DEBUG

spring:
  evn: local
  application:
    name: kbs
  
  # 数据库配置 (PGVector - Local)
  datasource:
    url: jdbc:postgresql://localhost:5432/kbs_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Spring AI 配置
  ai:
    # OpenAI (Local Ollama)
    openai:
      base-url: http://localhost:11434
      api-key: ollama
      chat:
        options:
          model: deepseek-r1:8b
    
    # PGVector 向量库配置
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 512
        index-type: HNSW
        distance-type: COSINE_DISTANCE

server:
  port: 10483

# 自定义 CLIP 模型配置 (保持不变，注意 key 名称微调以匹配 Configuration)
clip:
  model:
    text-path: "C:/Users/18699/Desktop/AI/计算机视觉/clip模型/text_model.onnx"
    tokenizer-path: "C:/Users/18699/Desktop/AI/计算机视觉/clip模型/tokenizer.json"
    vision-path: "C:/Users/18699/Desktop/AI/计算机视觉/clip模型/vision_model.onnx"
